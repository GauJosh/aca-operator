apiVersion: synoscd.io/v1alpha1
kind: App
metadata:
  name: my-api-service
  namespace: production
  labels:
    synoscd.io/managed: "true"
    team: backend
  annotations:
    description: "Main REST API service"
spec:
  containers:
    - name: api
      image: myacr.azurecr.io/api:v1.2.3
      cpu: 0.5
      memory: 1Gi
  environment:
    - name: LOG_LEVEL
      value: INFO
    - name: DATABASE_HOST
      value: my-db.postgres.database.azure.com
    - name: API_KEY
      valueFrom:
        secretRef: api-key-secret
  ingress:
    enabled: true
    external: true
    targetPort: 8080
    allowedOrigins:
      - "https://app.example.com"
      - "https://api.example.com"
  scale:
    minReplicas: 2
    maxReplicas: 10
  secrets:
    api-key-secret: /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.KeyVault/vaults/{vault}/secrets/api-key
  suspend: false
