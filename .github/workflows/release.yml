name: Build Release Artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  python-dist:
    name: Build wheel and sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz

  binary:
    name: Build standalone binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: synos-linux-x86_64
            binary_name: synos
            pyinstaller_args: --name synos
          - os: windows-latest
            artifact_name: synos-windows-x86_64
            binary_name: synos.exe
            pyinstaller_args: --name synos
          - os: macos-latest
            artifact_name: synos-macos-x86_64
            binary_name: synos
            pyinstaller_args: --name synos
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install .[release]

      - name: Build standalone binary
        shell: bash
        run: |
          python -m PyInstaller \
            --onefile \
            --console \
            --clean \
            --paths src \
            --collect-submodules synoscd \
            --name synos \
            src/synoscd/cli.py

      - name: Package binary
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/synos.exe release/synos.exe
          else
            cp dist/synos release/synos
            chmod +x release/synos
            tar -czf release/${{ matrix.artifact_name }}.tar.gz -C release synos
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [python-dist, binary]
    steps:
      - name: Download Python dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: release-assets/python-dist

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: synos-linux-x86_64
          path: release-assets/linux

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: synos-windows-x86_64
          path: release-assets/windows

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: synos-macos-x86_64
          path: release-assets/macos

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/python-dist/*
            release-assets/linux/*
            release-assets/windows/*
            release-assets/macos/*
          draft: false
          prerelease: false
          generate_release_notes: true